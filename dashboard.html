<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Tabungan Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;font-family:'Poppins',sans-serif;background:#f0f4f8;padding:20px;}
.card{background:white;border-radius:20px;padding:20px;margin-bottom:20px;box-shadow:0 10px 30px rgba(0,0,0,0.15);}
h2,h3{margin:0 0 10px 0;}
button{padding:10px 20px;border:none;border-radius:12px;margin:5px;cursor:pointer;transition:0.3s;color:white;font-weight:600;}
.btn-blue{background:#2196F3;} .btn-red{background:#f44336;} .btn-green{background:#4CAF50;}
input,select{width:100%;padding:10px;margin:5px 0;border-radius:10px;border:1px solid #ccc;font-size:16px;}
#popup{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;}
#popup .modal-content{background:white;border-radius:20px;padding:20px;width:90%;max-width:700px;max-height:80%;overflow:auto;position:relative;}
#popup table{width:100%;border-collapse:collapse;margin-top:10px;min-width:400px;}
#popup table th, #popup table td{padding:12px;border:1px solid #ddd;text-align:center;}
#popup table th{background:#2196F3;color:white;}
#popup .close-btn{position:absolute;top:10px;right:10px;}
.progress{background:#eee;border-radius:12px;overflow:hidden;height:12px;margin-top:5px;}
.bar{height:12px;background:#4CAF50;width:0%;transition:0.5s;}
</style>
</head>
<body>

<script>
let user = localStorage.getItem("user");
if(!user) window.location.href="login.html";
</script>

<div class="card">
<h2>Halo, <span id="user"></span></h2>
<button class="btn-red" onclick="logout()">Logout</button>
</div>

<div class="card">
<h3>💰 Ringkasan Keseluruhan</h3>
<p>Total Saldo: <span id="totalSaldo">Rp 0</span></p>
<p>Total Target: <span id="totalTarget">Rp 0</span></p>
<input type="number" id="inputTotalTarget" placeholder="Set Target Total Manual">
<button class="btn-blue" onclick="setTotalTarget()">Simpan Target Total</button>
<button class="btn-red" onclick="resetTargetManual()">Reset Target Manual</button>
<div class="progress"><div id="progressTotal" class="bar"></div></div>
<p id="persenTotal">0%</p>
</div>

<div class="card">
<h3>📈 Progress Tracker / Timeline Dashboard</h3>
<canvas id="timelineChart" height="150"></canvas>
</div>

<div class="card">
<h3>🎯 Target per Akun</h3>
<select id="targetAkun">
<option>BRI</option><option>BCA</option><option>DANA</option><option>SeaBank</option><option>Jago</option>
</select>
<input type="number" id="targetJumlah" placeholder="Target">
<button class="btn-blue" onclick="setTarget()">Simpan</button>
</div>

<div class="card">
<h3>📊 Laporan Transaksi per Tanggal</h3>
<button class="btn-blue" onclick="openLaporanPopup()">Tampilkan Laporan</button>
<button class="btn-green" onclick="goTransaksi()">➡ Halaman Transaksi</button>
</div>

<!-- Popup Modal -->
<div id="popup">
  <div class="modal-content">
    <h3>📋 Laporan Transaksi per Tanggal</h3>
    <div style="overflow-x:auto;">
      <table id="tabelPopup">
        <thead>
          <tr><th>Tanggal</th><th>Akun</th><th>Jumlah</th><th>Target Akun</th><th>Progres</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
    <button class="btn-red close-btn" onclick="closePopup()">✖</button>
  </div>
</div>

<script>
// Fungsi format ke Rupiah
function formatRupiah(angka){
  return "Rp " + angka.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
}

// Data localStorage
document.getElementById('user').innerText=user;
let akun = JSON.parse(localStorage.getItem(user+"_akun")) || {};
let riwayat = JSON.parse(localStorage.getItem(user+"_riwayat")) || [];
let target = JSON.parse(localStorage.getItem(user+"_target")) || {};
let totalTargetManual = +localStorage.getItem(user+"_totalTargetManual") || 0;

// Simpan
function simpan(){
  localStorage.setItem(user+"_akun",JSON.stringify(akun));
  localStorage.setItem(user+"_riwayat",JSON.stringify(riwayat));
  localStorage.setItem(user+"_target",JSON.stringify(target));
  localStorage.setItem(user+"_totalTargetManual",totalTargetManual);
}

// Hitung saldo kumulatif per akun untuk timeline chart
function getTimelineData(){
  let sorted = riwayat.slice().sort((a,b)=> new Date(a.tanggal) - new Date(b.tanggal));
  let labels = sorted.map(r=>r.tanggal);
  let datasets = {};
  sorted.forEach(r=>{
    if(!datasets[r.akun]) datasets[r.akun] = [];
    let prev = datasets[r.akun].length > 0 ? datasets[r.akun][datasets[r.akun].length-1] : 0;
    let value = prev + (r.tipe==='masuk'? Number(r.jumlah) : -Number(r.jumlah));
    datasets[r.akun].push(value);
  });
  return {labels, datasets};
}

// Render timeline chart
let timelineChart;
function renderTimelineChart(){
  let ctx = document.getElementById('timelineChart').getContext('2d');
  let data = getTimelineData();
  let chartData = {labels: data.labels, datasets: []};
  let colors = ["#2196F3","#4CAF50","#FF9800","#9C27B0","#f44336"];
  let i=0;
  for(let a in data.datasets){
    chartData.datasets.push({
      label: a,
      data: data.datasets[a],
      borderColor: colors[i%colors.length],
      fill:false,
      tension:0.2
    });
    i++;
  }
  if(timelineChart) timelineChart.destroy();
  timelineChart = new Chart(ctx,{type:'line',data:chartData,options:{responsive:true,plugins:{legend:{position:'bottom'}}}});
}

// Hitung total keseluruhan
function hitungTotal(){
  let ts = 0, tt = 0;
  riwayat.forEach(r=>{
    ts += (r.tipe==='masuk'? Number(r.jumlah) : -Number(r.jumlah));
  });
  if(totalTargetManual > 0) tt = totalTargetManual;
  else for(let t in target) tt += target[t];
  let p = tt ? Math.min(ts/tt*100,100) : 0;
  document.getElementById('totalSaldo').innerText = formatRupiah(ts);
  document.getElementById('totalTarget').innerText = formatRupiah(tt);
  document.getElementById('persenTotal').innerText = p.toFixed(0) + "%";
  document.getElementById('progressTotal').style.width = p + "%";
}

// Target akun
function setTarget(){ 
  let a = document.getElementById('targetAkun').value; 
  let j = +document.getElementById('targetJumlah').value; 
  if(j <= 0) return alert("Isi target!"); 
  target[a] = j; 
  simpan(); 
  document.getElementById('targetJumlah').value = ""; // reset input
  updateUI();
}

function setTotalTarget(){
  let val = +document.getElementById('inputTotalTarget').value;
  if(val <= 0) return alert("Isi target!");
  totalTargetManual = val; 
  simpan(); 
  document.getElementById('inputTotalTarget').value = ""; // reset input
  updateUI();
}

function resetTargetManual(){ 
  totalTargetManual = 0; 
  simpan(); 
  updateUI(); 
}
function logout(){ localStorage.removeItem("user"); window.location.href="login.html"; }
function goTransaksi(){ window.location.href="transaksi.html"; }

// Popup laporan per tanggal
function openLaporanPopup(){
  let tbody = document.querySelector("#tabelPopup tbody");
  tbody.innerHTML = "";
  riwayat.forEach(r=>{
    if(!r.tanggal) return;
    let tAkun = target[r.akun]||0;
    let progres = tAkun ? Math.min(Number(r.jumlah)/tAkun*100,100) : 0;
    tbody.innerHTML += `<tr>
      <td>${r.tanggal}</td>
      <td>${r.akun}</td>
      <td>${formatRupiah(Number(r.jumlah))}</td>
      <td>${formatRupiah(tAkun)}</td>
      <td>
        <div class="progress" style="margin:0 auto;width:80px;">
          <div class="bar" style="width:${progres}%"></div>
        </div>
        ${progres.toFixed(0)}%
      </td>
    </tr>`;
  });
  document.getElementById("popup").style.display = "flex";
}
function closePopup(){ document.getElementById("popup").style.display="none"; }

// Update UI
function updateUI(){ hitungTotal(); renderTimelineChart(); }

updateUI();
</script>
</body>
</html>
