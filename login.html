<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Tabungan Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Poppins',sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;justify-content:center;align-items:center;height:100vh;color:white;}
.card{background:white;color:black;padding:30px;border-radius:20px;box-shadow:0 15px 40px rgba(0,0,0,0.3);width:90%;max-width:400px;text-align:center;animation:fadeIn 0.8s ease;}
input{width:90%;padding:15px;margin:15px 0;border-radius:12px;border:1px solid #ccc;font-size:16px;}
button{padding:15px 25px;margin-top:10px;border:none;border-radius:12px;background:#4CAF50;color:white;font-size:16px;cursor:pointer;transition:0.3s;}
button:hover{background:#45a049;}
@keyframes fadeIn{0%{opacity:0;transform:translateY(-20px);}100%{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div class="card">
<h2>Login Tabungan Pro</h2>
<input type="text" id="username" placeholder="Masukkan Nama">
<br>
<button onclick="login()">Masuk</button>
</div>

<script>
function login(){
 let user=document.getElementById("username").value;
 if(!user) return alert("Isi nama!");
 localStorage.setItem("user",user);
 window.location.href="dashboard.html";
}
if(localStorage.getItem("user")) window.location.href="dashboard.html";
</script>
</body>
</html>
